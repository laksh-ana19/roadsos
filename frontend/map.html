<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoadSoS - Live Tracking</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/map.css">

  <!-- Leaflet (FREE MAP LIBRARY) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

  <header class="topbar">
    <h2>🚑 Live Emergency Tracking</h2>
    <a href="home.html">Back</a>
  </header>

  <div id="offlineBanner" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:red;
  color:white;
  text-align:center;
  padding:8px;
  z-index:9999;
  ">
  </div>

  <div class="map-container">

    <div id="map"></div>

    <div class="info-panel">
      <h3>Status</h3>
      <p>🚨 Emergency Active</p>
      <p id="distance">Distance: Calculating...</p>
      <p id="eta">ETA: Updating...</p>
      <p id="statusText">Status: Dispatching ambulance...</p>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/map.js"></script>

</body>
</html>
