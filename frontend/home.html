<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RoadSoS - Home</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>

<body>

<header class="topbar">

  <!-- HAMBURGER -->
  <div class="menu-btn" onclick="toggleMenu(event)">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <h2 class="title">RoadSoS Dashboard</h2>
</header>

<!-- OVERLAY (click outside to close) -->
<div id="overlay" class="overlay hidden" onclick="closeMenu()"></div>

<!-- SIDE PANEL -->
<div id="sidePanel" class="side-panel glass">
  <h3>Quick Services</h3>

  <div class="side-item" onclick="window.location.href='hospitals.html'">
  Hospitals
  </div>
  <div class="side-item" onclick="window.location.href='ambulance.html'">
   Ambulance
  </div>
  <div class="side-item" onclick="window.location.href='police.html'">
  Police
  </div>
  <div class="side-item" onclick="window.location.href='towing.html'">
  Towing
  </div>
  <div class="side-item" onclick="window.location.href='repair.html'">
  Repair Shops
  </div>
  <div class="side-item" onclick="window.location.href='showrooms.html'">
  Showrooms
  </div>
  <div class="side-item" onclick="window.location.href='emergencies.html'">
     Recent Emergencies
  </div>
</div>


  <!-- CENTER SOS -->
  <div class="center-sos">

    <button id="sosButton" class="sos-btn">
       SOS
    </button>

    <p class="hint">Press only in emergency</p>

  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden glass">
  🚨 Emergency Sent Successfully
</div>

<div id="offlineBanner" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:red;
  color:white;
  text-align:center;
  padding:8px;
  z-index:9999;
">
</div>

<script src="js/sos.js"></script>

</body>
</html>
